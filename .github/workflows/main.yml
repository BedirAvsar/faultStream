# ==============================================================
# FAULTSTREAM - CI/CD
# ==============================================================
# CI NEDIR?
# Bizim yazdığımız kodun otomatik olarak derlenip test edilmesidir
# CD NEDIR?
# CI adımından başarı ile geçen kodun otomatik olarak sunuculara gönderilmesidir
# ==============================================================

name: FaultStream CI/CD
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: 3. Projeyi Derle
        run: ./mvnw clean compile -DskipTests
